# AWS Amplify Hosting build settings.
# Connect this repo in the Amplify console; it auto-detects this file.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        # .nvmrc pins Node 24, which bundles npm 11. package-lock.json is
        # lockfileVersion 3 written by npm 11; npm 10 (bundled with Node 22)
        # resolves some transitive deps differently and fails `npm ci` with
        # "Missing: cac@... from lock file". Do not drop back to Node 22.
        - nvm install # uses the version in .nvmrc
        # --prefer-offline: install from the cached ~/.npm tarballs below instead of
        #   revalidating every package against the registry.
        # --no-audit: skip the vulnerability audit's network round-trip (the CI job on
        #   GitHub already gates that); it adds latency and occasionally flakes a build.
        # --no-fund: drop the funding-metadata output.
        - npm ci --prefer-offline --no-audit --no-fund
    build:
      commands:
        # Amplify's build image exports NITRO_PRESET=aws-amplify, which redirects the
        # output to .amplify-hosting/ as an SSR bundle. This site is fully prerendered,
        # so force the static preset to keep everything in .output/public.
        - NITRO_PRESET=static npm run generate
  artifacts:
    # `nuxt generate` writes the fully prerendered static site here.
    baseDirectory: .output/public
    files:
      - '**/*'
  cache:
    paths:
      # npm's tarball cache, not node_modules. A restored node_modules can be
      # reconciled into package-lock.json, which then breaks `npm ci`.
      - ~/.npm/**/*
      # nvm's download cache. `nvm install` reuses the cached Node 24 tarball here
      # instead of re-fetching it from nodejs.org on every build.
      - ~/.nvm/.cache/**/*

# Amplify serves static files with a short default TTL. These override it.
customHeaders:
  # Nuxt fingerprints these filenames, so a new build produces a new URL.
  - pattern: '/_nuxt/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: '/_fonts/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  # Image filenames are stable across builds, so revalidate rather than pin for a year.
  - pattern: '/galleries/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=2592000, stale-while-revalidate=86400'
  - pattern: '/thumbnails/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=2592000, stale-while-revalidate=86400'
  # HTML must revalidate, otherwise a deploy takes a month to reach repeat visitors.
  - pattern: '**/*.html'
    headers:
      - key: Cache-Control
        value: 'public, max-age=0, must-revalidate'
      - key: X-Content-Type-Options
        value: nosniff
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
