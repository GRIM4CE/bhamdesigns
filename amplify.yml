# AWS Amplify Hosting build settings.
# Connect this repo in the Amplify console; it auto-detects this file.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install # uses the version in .nvmrc
        - npm ci
    build:
      commands:
        - npm run generate
  artifacts:
    # `nuxt generate` writes the fully prerendered static site here.
    baseDirectory: .output/public
    files:
      - '**/*'
  cache:
    paths:
      # npm's tarball cache, not node_modules. A restored node_modules can be
      # reconciled into package-lock.json, which then breaks `npm ci`.
      - ~/.npm/**/*

# Amplify serves static files with a short default TTL. These override it.
customHeaders:
  # Nuxt fingerprints these filenames, so a new build produces a new URL.
  - pattern: '/_nuxt/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: '/_fonts/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  # Image filenames are stable across builds, so revalidate rather than pin for a year.
  - pattern: '/galleries/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=2592000, stale-while-revalidate=86400'
  - pattern: '/thumbnails/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=2592000, stale-while-revalidate=86400'
  # HTML must revalidate, otherwise a deploy takes a month to reach repeat visitors.
  - pattern: '**/*.html'
    headers:
      - key: Cache-Control
        value: 'public, max-age=0, must-revalidate'
      - key: X-Content-Type-Options
        value: nosniff
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
